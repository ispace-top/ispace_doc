<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="240" height="80" viewBox="0 0 240 80" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="240" height="80" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- 图标组合 -->
  <g transform="translate(20, 15)">
    <!-- 文档堆叠效果 -->
    <rect x="5" y="8" width="28" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="2" y="5" width="28" height="35" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="0" y="2" width="28" height="35" rx="4" fill="url(#textGradient)" filter="url(#shadow)"/>
    
    <!-- 文档内容 -->
    <line x1="4" y1="10" x2="22" y2="10" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <line x1="4" y1="15" x2="22" y2="15" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <line x1="4" y1="20" x2="18" y2="20" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <line x1="4" y1="25" x2="20" y2="25" stroke="white" stroke-width="1.5" opacity="0.7"/>
    
    <!-- 爱心点缀 -->
    <circle cx="35" cy="10" r="6" fill="#fef2f2" stroke="#f87171" stroke-width="1"/>
    <path d="M32 8 C32 6, 33.5 5.5, 35 7.5 C36.5 5.5, 38 6, 38 8 C38 10, 35 12.5, 35 12.5 C35 12.5, 32 10, 32 8 Z" fill="#e11d48"/>
  </g>
  
  <!-- 主标题 -->
  <text x="70" y="35" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="url(#textGradient)">
    爱思文档
  </text>
  
  <!-- 副标题 -->
  <text x="70" y="55" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#64748b">
    iSpaceDoc - 智能文档管理平台
  </text>
</svg>
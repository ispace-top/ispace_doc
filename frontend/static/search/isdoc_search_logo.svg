<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="200" height="200" viewBox="0 0 200 200" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" stroke="url(#mainGradient)" stroke-width="2"/>
  
  <!-- 主要文档图标 -->
  <g transform="translate(100, 100)">
    <!-- 后面的文档 -->
    <rect x="-35" y="-25" width="45" height="55" rx="5" fill="url(#mainGradient)" opacity="0.6"/>
    <!-- 中间的文档 -->
    <rect x="-25" y="-35" width="45" height="55" rx="5" fill="url(#mainGradient)" opacity="0.8"/>
    <!-- 前面的文档 -->
    <rect x="-15" y="-45" width="45" height="55" rx="5" fill="url(#mainGradient)"/>
    
    <!-- 文档内容线条 -->
    <line x1="-8" y1="-35" x2="18" y2="-35" stroke="white" stroke-width="2" opacity="0.9"/>
    <line x1="-8" y1="-25" x2="18" y2="-25" stroke="white" stroke-width="2" opacity="0.9"/>
    <line x1="-8" y1="-15" x2="12" y2="-15" stroke="white" stroke-width="2" opacity="0.9"/>
    
    <!-- 爱心装饰 -->
    <path d="M-35 -50 C-35 -55, -30 -58, -25 -52 C-20 -58, -15 -55, -15 -50 C-15 -45, -25 -38, -25 -38 C-25 -38, -35 -45, -35 -50 Z" fill="#e11d48" opacity="0.9"/>
  </g>
  
  <!-- 底部文字 -->
  <text x="100" y="165" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="url(#mainGradient)">
    爱思文档
  </text>
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#64748b">
    iSpaceDoc
  </text>
</svg>
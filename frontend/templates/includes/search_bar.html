{% comment %}
Usage: {% include "includes/search_bar.html" with placeholder="搜索..." value=search_query %}
{% endcomment %}
<div class="ispace-search-input-wrap">
    <svg class="ispace-search-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text"
           class="ispace-form-input"
           placeholder="{{ placeholder|default:'搜索文档...' }}"
           value="{{ value|default:'' }}"
           name="{{ name|default:'q' }}"
           autocomplete="off">
</div>

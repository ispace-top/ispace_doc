{% load i18n %}
{% for doc in docs %}
<div class="ispace-tree-node" data-doc-id="{{ doc.id }}" data-can-create="{% if doc.can_create %}1{% else %}0{% endif %}" data-can-manage="{% if doc.can_manage %}1{% else %}0{% endif %}">
    <div class="ispace-tree-row">
        <span class="ispace-tree-toggle"
              data-has-children="{% if doc.has_children %}1{% else %}0{% endif %}"
              data-expanded="{% if doc.open_children %}1{% else %}0{% endif %}"
              data-icon-state="{% if doc.has_children %}{% if doc.open_children %}folder-open{% else %}folder-closed{% endif %}{% else %}doc{% endif %}">
            {% if doc.has_children %}
                {% if doc.open_children %}
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/></svg>
                {% else %}
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
                {% endif %}
            {% else %}
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
            {% endif %}
        </span>
        <a href="{% url 'doc_by_id' doc_id=doc.id %}"
           class="ispace-tree-link ispace-sidebar-link" data-doc-id="{{ doc.id }}" data-spa>
            <span class="ispace-truncate">{{ doc.name }}</span>
        </a>
    </div>
    {% if doc.has_children %}
    <div class="ispace-tree-children" style="display:{% if doc.open_children %}block{% else %}none{% endif %};">
        {% include "includes/sidebar_doc_node.html" with docs=doc.children %}
    </div>
    {% endif %}
</div>
{% endfor %}

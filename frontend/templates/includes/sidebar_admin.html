{% load static %}
<aside class="ispace-sidebar" id="admin-sidebar">
    <h3 class="ispace-font-semibold ispace-text-sm ispace-text-secondary ispace-mb-4" style="padding: 0 var(--ispace-space-2);">管理后台</h3>
    <nav class="ispace-sidebar-nav">
        {% for item in admin_menu %}
        <a href="{{ item.url }}"
           class="ispace-sidebar-link {% if item.active %}ispace-active{% endif %}"
           {% if item.active %}aria-current="page"{% endif %}>
            {% if item.icon %}
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                {{ item.icon|safe }}
            </svg>
            {% endif %}
            <span>{{ item.label }}</span>
            {% if item.badge %}
            <span class="ispace-badge ispace-badge-primary ispace-ml-auto">{{ item.badge }}</span>
            {% endif %}
        </a>
        {% endfor %}
    </nav>
</aside>

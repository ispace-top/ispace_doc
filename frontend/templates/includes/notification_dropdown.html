{% load static %}
<div class="ispace-notification-dropdown" data-ispace-dropdown>
    <button class="ispace-notification-trigger" data-ispace-dropdown-toggle aria-expanded="false" aria-label="通知">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="ispace-notification-badge" id="notification-badge" style="display:none;">0</span>
    </button>
    <div class="ispace-dropdown-menu ispace-notification-panel" style="min-width:360px;max-height:480px;">
        <div class="ispace-notification-header">
            <span class="ispace-font-semibold">通知</span>
            <button class="ispace-notification-mark-all" id="btn-mark-all-read" style="display:none;">全部已读</button>
        </div>
        <div class="ispace-notification-list" id="notification-list">
            <div class="ispace-empty-state" style="padding:32px 16px;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--ispace-color-text-quaternary);margin-bottom:12px;">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="ispace-text-quaternary">暂无通知</span>
            </div>
        </div>
        <div class="ispace-notification-footer">
            <a href="/my/?tab=notifications" class="ispace-notification-view-all">查看全部通知</a>
        </div>
    </div>
</div>

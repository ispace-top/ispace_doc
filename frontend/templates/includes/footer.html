{% load static %}{% load i18n %}
<footer class="ispace-footer">
    <div class="ispace-footer-inner">
        <div class="ispace-footer-start">
            <img src="{% if site_logo_footer %}{{ site_logo_footer }}{% else %}{% if site_logo %}{{ site_logo }}{% else %}{% static 'logo.png' %}{% endif %}{% endif %}" width="18" height="18" alt="logo">
            <span class="ispace-footer-brand">{{ site_name|default:"爱思文档" }}</span>
            {% if site_sub_name %}
            <span class="ispace-footer-divider">|</span>
            <span class="ispace-footer-tagline">{{ site_sub_name }}</span>
            {% endif %}
        </div>
        <div class="ispace-footer-end">
            <span class="ispace-footer-text">&copy; {% now "Y" %} {{ site_name|default:"爱思文档" }}</span>
            {% if beian_code %}
            <a class="ispace-footer-text ispace-footer-link" href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <path d="M9 12l2 2 4-4"/>
                </svg>
                {{ beian_code }}
            </a>
            {% endif %}
            <a class="ispace-footer-text ispace-footer-link" href="{% url 'about' %}">{% trans "关于我们" %}</a>
        </div>
    </div>
</footer>

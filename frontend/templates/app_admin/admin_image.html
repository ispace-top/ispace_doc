{% extends "base.html" %}
{% load static %}
{% load i18n %}
{% block title %}图片管理{% endblock %}

{% block styles %}
<style>
    .admin-image-toolbar {
        display: flex;
        align-items: center;
        gap: var(--ispace-space-4);
        flex-wrap: wrap;
    }
    .admin-image-toolbar .ispace-form-input {
        max-width: 200px;
    }
    .admin-image-search-group {
        display: flex;
        align-items: center;
        gap: var(--ispace-space-1);
    }
    .admin-image-table-wrap { overflow-x: auto; }
    .image-file-icon {
        width: 20px;
        height: 20px;
        vertical-align: middle;
        margin-right: 6px;
    }
    .image-name-cell {
        display: flex;
        align-items: center;
    }
    .image-preview-modal-content {
        display: flex;
        align-items: center;
        justify-content: center;
        max-width: 100%;
        max-height: 70vh;
    }
    .image-preview-modal-content img {
        max-width: 100%;
        max-height: 70vh;
        object-fit: contain;
    }
    .admin-image-toolbar #select-user {
        min-width: 150px;
    }
    .admin-image-toolbar xm-select {
        min-width: 150px;
        border: 1px solid var(--ispace-color-border-medium) !important;
        border-radius: var(--ispace-radius-sm);
        background: var(--ispace-color-surface-0) !important;
        color: var(--ispace-color-text-primary) !important;
        font-size: var(--ispace-font-sm);
        height: 32px;
        line-height: 32px;
    }
    .admin-image-toolbar xm-select .xm-tips {
        color: var(--ispace-color-text-tertiary);
    }
    .admin-image-page-size {
        display: flex;
        align-items: center;
        gap: var(--ispace-space-2);
        font-size: var(--ispace-font-sm);
        color: var(--ispace-color-text-tertiary);
    }
    .admin-image-page-size select {
        height: 30px;
        padding: 0 6px;
        font-size: var(--ispace-font-sm);
        border: 1px solid var(--ispace-color-border-medium);
        border-radius: var(--ispace-radius-sm);
        background: var(--ispace-color-surface-0);
        color: var(--ispace-color-text-primary);
    }
    .image-table-col-path { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .image-table-col-name { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
{% endblock %}

{% block content %}
<div class="dashboard-wrapper">

<div class="dashboard-card">
    <div class="dashboard-card-header">
        <div class="admin-image-toolbar">
            <div class="admin-image-search-group">
                <input type="text" id="image-kw" placeholder="请输入图片名称" class="ispace-form-input">
                <button class="ispace-btn ispace-btn-primary ispace-btn-sm" id="search-btn">搜索</button>
            </div>
            <div class="admin-image-search-group">
                <span class="ispace-text-sm ispace-text-tertiary" style="white-space:nowrap;">用户</span>
                <div id="select-user"></div>
                <button class="ispace-btn ispace-btn-primary ispace-btn-sm" id="searchUser-btn">筛选</button>
            </div>
            <div style="margin-left:auto;display:flex;align-items:center;gap:var(--ispace-space-3);">
                <span class="ispace-text-sm ispace-text-tertiary" id="image-count-info"></span>
                <button class="ispace-btn ispace-btn-secondary ispace-btn-sm" id="scan-btn">扫描未使用图片</button>
                <button class="ispace-btn ispace-btn-danger ispace-btn-sm" id="batch-remove-btn">批量删除</button>
            </div>
        </div>
    </div>
    <div class="dashboard-card-body">

        <div class="admin-image-table-wrap">
            <table class="ispace-table" id="image-table">
                <thead>
                    <tr>
                        <th style="width:36px;"><input type="checkbox" id="select-all-images"></th>
                        <th>图片名称</th>
                        <th>图片路径</th>
                        <th>备注</th>
                        <th>用户</th>
                        <th>上传时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="image-table-body">
                </tbody>
            </table>
        </div>
        <div class="ispace-flex-between ispace-mt-3">
            <div id="image-pagination" class="ispace-pagination"></div>
            <div class="admin-image-page-size">
                <span>每页</span>
                <select id="page-size-select">
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                </select>
                <span>条</span>
            </div>
        </div>
    </div>
</div>

</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'xm-select/dist/xm-select.js' %}"></script>
<script src="{% static 'viewerjs/viewer.min.js' %}"></script>
<script>
(function() {
    const API_URL = "{% url 'api_admin_imgs' %}";
    const USER_LIST_URL = "{% url 'api_usergroups_userlist' %}";
    const CSRF_TOKEN = document.querySelector('[name=csrfmiddlewaretoken]').value;
    let currentPage = 1;
    let currentFilters = {};
    let selectUser = null;

    function getPageSize() {
        var sel = document.getElementById('page-size-select');
        return sel ? parseInt(sel.value) : 10;
    }

    function getCSRFHeaders() {
        return {
            'X-CSRFToken': CSRF_TOKEN,
            'Content-Type': 'application/x-www-form-urlencoded',
        };
    }

    function formatDateTime(dateStr) {
        if (!dateStr) return '-';
        const d = new Date(dateStr);
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function getFileTypeIcon(fileName) {
        if (!fileName) return '/static/filetype-icons/img_others.svg';
        const ext = fileName.split('.').pop().toLowerCase();
        const iconMap = {
            'png': '/static/filetype-icons/img_png.svg',
            'jpg': '/static/filetype-icons/img_jpg.svg',
            'jpeg': '/static/filetype-icons/img_jpg.svg',
            'gif': '/static/filetype-icons/img_gif.svg',
            'bmp': '/static/filetype-icons/img_bmp.svg',
            'svg': '/static/filetype-icons/img_others.svg',
            'webp': '/static/filetype-icons/img_others.svg',
        };
        return iconMap[ext] || '/static/filetype-icons/img_others.svg';
    }

    async function loadTable(page) {
        if (page === undefined) page = currentPage;
        currentPage = page;

        const params = new URLSearchParams();
        params.set('page', page);
        params.set('limit', getPageSize());
        if (currentFilters.kw) params.set('kw', currentFilters.kw);
        if (currentFilters.username) params.set('username', currentFilters.username);
        if (currentFilters.mode) params.set('mode', currentFilters.mode);

        try {
            const resp = await fetch(`${API_URL}?${params.toString()}`);
            const result = await resp.json();
            if (result.code === 0) {
                renderImageRows(result.data || []);
                renderPagination(result.count || 0, page);
                document.getElementById('image-count-info').textContent = '共 ' + (result.count || 0) + ' 张图片';
            } else {
                showError(result.data || '获取图片列表失败');
            }
        } catch (err) {
            showError('获取图片列表失败');
        }
    }

    function renderImageRows(rows) {
        const tbody = document.getElementById('image-table-body');
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="ispace-text-center ispace-text-tertiary" style="padding:40px;">暂无数据</td></tr>';
            return;
        }
        tbody.innerHTML = rows.map(function(row) {
            const iconSrc = getFileTypeIcon(row.file_name);
            return `
                <tr data-image-id="${row.id}" data-image-path="${escapeHtml(row.file_path)}">
                    <td><input type="checkbox" class="image-checkbox" value="${row.id}"></td>
                    <td>
                        <div class="image-name-cell image-table-col-name" title="${escapeHtml(row.file_name)}">
                            <img src="${iconSrc}" class="image-file-icon" alt="">
                            ${escapeHtml(row.file_name)}
                        </div>
                    </td>
                    <td class="ispace-text-sm ispace-text-tertiary image-table-col-path" title="${escapeHtml(row.file_path || '')}">${escapeHtml(row.file_path || '-')}</td>
                    <td>${escapeHtml(row.remark || '-')}</td>
                    <td>${escapeHtml(row.username || '-')}</td>
                    <td class="ispace-text-sm">${formatDateTime(row.create_time)}</td>
                    <td>
                        <button class="ispace-btn ispace-btn-secondary ispace-btn-sm" data-action="preview" data-id="${row.id}" data-path="${escapeHtml(row.file_path)}" title="预览">预览</button>
                        <button class="ispace-btn ispace-btn-danger ispace-btn-sm" data-action="delete" data-id="${row.id}">删除</button>
                    </td>
                </tr>`;
        }).join('');
    }

    function renderPagination(count, page) {
        const container = document.getElementById('image-pagination');
        const totalPages = Math.ceil(count / getPageSize()) || 1;
        let html = '';

        html += `<button class="ispace-pagination-btn" data-page="${page - 1}" ${page <= 1 ? 'disabled' : ''}>上一页</button>`;

        const startPage = Math.max(1, page - 2);
        const endPage = Math.min(totalPages, page + 2);

        if (startPage > 1) {
            html += `<button class="ispace-pagination-btn" data-page="1">1</button>`;
            if (startPage > 2) html += '<span class="ispace-pagination-info">...</span>';
        }
        for (let i = startPage; i <= endPage; i++) {
            html += `<button class="ispace-pagination-btn ${i === page ? 'ispace-active' : ''}" data-page="${i}">${i}</button>`;
        }
        if (endPage < totalPages) {
            if (endPage < totalPages - 1) html += '<span class="ispace-pagination-info">...</span>';
            html += `<button class="ispace-pagination-btn" data-page="${totalPages}">${totalPages}</button>`;
        }

        html += `<button class="ispace-pagination-btn" data-page="${page + 1}" ${page >= totalPages ? 'disabled' : ''}>下一页</button>`;
        container.innerHTML = html;

        container.querySelectorAll('.ispace-pagination-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const p = parseInt(this.dataset.page);
                if (p >= 1 && p <= totalPages && p !== currentPage) {
                    loadTable(p);
                }
            });
        });
    }

    function openImagePreview(imagePath) {
        const modalId = 'image-preview-modal';
        let existing = document.getElementById(modalId);
        if (existing) existing.remove();

        const backdrop = document.createElement('div');
        backdrop.className = 'ispace-modal-backdrop';
        backdrop.id = modalId;
        backdrop.innerHTML = `
            <div class="ispace-modal ispace-modal-lg" style="max-width:90vw;">
                <div class="ispace-modal-header">
                    <h3 class="ispace-modal-title">图片预览</h3>
                    <button class="ispace-modal-close" data-ispace-modal-close>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div class="ispace-modal-body">
                    <div class="image-preview-modal-content">
                        <img src="${imagePath}" alt="预览图片" id="preview-image">
                    </div>
                </div>
                <div class="ispace-modal-footer">
                    <button class="ispace-btn ispace-btn-secondary" data-ispace-modal-close>关闭</button>
                </div>
            </div>
        `;
        document.body.appendChild(backdrop);

        backdrop.querySelector('[data-ispace-modal-close]').addEventListener('click', function() {
            iSpaceDoc.Modal.close(backdrop);
            setTimeout(function() { backdrop.remove(); }, 300);
        });

        const previewImg = document.getElementById('preview-image');
        if (previewImg && typeof Viewer !== 'undefined') {
            previewImg.addEventListener('load', function() {
                new Viewer(previewImg, {
                    inline: false,
                    toolbar: false,
                    navbar: false,
                    title: false,
                });
            });
        }

        iSpaceDoc.Modal.open(backdrop);
    }

    async function delImage(id) {
        const confirmed = await iSpaceDoc.confirm(
            '警告：此操作将<span style="font-weight:700;color:red;">删除此图片且不可恢复！</span>',
            { title: '删除图片' }
        );
        if (!confirmed) return;

        try {
            const resp = await fetch('/admin/api/img/' + id + '/', {
                method: 'DELETE',
                headers: getCSRFHeaders()
            });
            const result = await resp.json();
            if (result.code == 0) {
                showSuccess('删除成功');
                loadTable(1);
            } else {
                showError(result.data || '删除失败');
            }
        } catch (err) {
            showError('删除异常');
        }
    }

    function scanImages() {
        iSpaceDoc.confirm(
            '扫描站点已上传但未在文档中引用的图片，此操作可能会花费一些时间，请耐心等待扫描完成。',
            { title: '扫描未使用图片', confirmText: '开始扫描' }
        ).then(function(confirmed) {
            if (confirmed) {
                currentFilters.mode = 'scan';
                currentPage = 1;
                loadTable(1);
                delete currentFilters.mode;
            }
        });
    }

    function batchRemove() {
        const checkboxes = document.querySelectorAll('.image-checkbox:checked');
        if (checkboxes.length === 0) {
            showWarning("{% trans '未选中任何图片' %}");
            return;
        }
        const ids = Array.from(checkboxes).map(function(cb) { return cb.value; });
        const idStr = ids.join(',');

        const modalId = 'batch-delete-image-modal';
        let existing = document.getElementById(modalId);
        if (existing) existing.remove();

        const backdrop = document.createElement('div');
        backdrop.className = 'ispace-modal-backdrop';
        backdrop.id = modalId;
        backdrop.innerHTML = `
            <div class="ispace-modal ispace-modal-sm">
                <div class="ispace-modal-header">
                    <h3 class="ispace-modal-title">{% trans "删除图片" %}</h3>
                    <button class="ispace-modal-close" data-ispace-modal-close>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div class="ispace-modal-body">
                    <div style="margin-left:10px;">你正在批量删除图片！<br><br>警告！此操作将<span style="font-weight:700;color:red;">删除所选图片！</span>并且<span style="font-weight:700;color:red;">不可恢复！</span><br><br>请输入 "DELETE" 以再次确认删除。<br>
                        <input class="ispace-form-input" style="width:95%;margin-top:8px;" id="confirm-batch-delete-img" placeholder="DELETE">
                    </div>
                </div>
                <div class="ispace-modal-footer">
                    <button class="ispace-btn ispace-btn-secondary" data-ispace-modal-close>{% trans "取消" %}</button>
                    <button class="ispace-btn ispace-btn-danger" id="batch-delete-img-confirm">{% trans "批量删除" %}</button>
                </div>
            </div>
        `;
        document.body.appendChild(backdrop);

        function closeModal() {
            iSpaceDoc.Modal.close(backdrop);
            setTimeout(function() { backdrop.remove(); }, 300);
        }

        backdrop.querySelector('[data-ispace-modal-close]').addEventListener('click', closeModal);
        backdrop.querySelector('#batch-delete-img-confirm').addEventListener('click', async function() {
            const confirmInput = document.getElementById('confirm-batch-delete-img').value;
            if (confirmInput !== 'DELETE') {
                showWarning('输入错误！');
                return;
            }

            const body = new URLSearchParams();
            body.set('id', idStr);
            body.set('csrfmiddlewaretoken', CSRF_TOKEN);

            try {
                const resp = await fetch(API_URL, {
                    method: 'DELETE',
                    headers: getCSRFHeaders(),
                    body: body.toString()
                });
                const result = await resp.json();
                closeModal();
                if (result.code == 0) {
                    showSuccess("{% trans '删除成功' %}");
                    loadTable(1);
                } else {
                    showError(result.data || '删除失败');
                }
            } catch (err) {
                closeModal();
                showError('删除异常');
            }
        });

        iSpaceDoc.Modal.open(backdrop);
    }

    document.getElementById('image-table-body').addEventListener('click', function(e) {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;

        const action = btn.dataset.action;
        const id = btn.dataset.id;
        const imagePath = btn.dataset.path;

        if (action === 'delete') {
            delImage(id);
        } else if (action === 'preview') {
            let realpath = imagePath;
            if (realpath && !realpath.startsWith('http')) {
                realpath = '/' + realpath.replace(/^\//, '');
            }
            openImagePreview(realpath);
        }
    });

    document.getElementById('select-all-images').addEventListener('change', function() {
        const checked = this.checked;
        document.querySelectorAll('.image-checkbox').forEach(function(cb) {
            cb.checked = checked;
        });
    });

    document.getElementById('search-btn').addEventListener('click', function() {
        currentFilters.kw = document.getElementById('image-kw').value.trim();
        loadTable(1);
    });

    document.getElementById('image-kw').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            currentFilters.kw = this.value.trim();
            loadTable(1);
        }
    });

    document.getElementById('searchUser-btn').addEventListener('click', function() {
        if (selectUser) {
            currentFilters.username = selectUser.getValue('valueStr');
            loadTable(1);
        }
    });

    document.getElementById('scan-btn').addEventListener('click', scanImages);
    document.getElementById('batch-remove-btn').addEventListener('click', batchRemove);

    document.getElementById('page-size-select').addEventListener('change', function() {
        loadTable(1);
    });

    function initXmSelect() {
        selectUser = xmSelect.render({
            el: '#select-user',
            filterable: true,
            radio: true,
            paging: true,
            minwidth: 150,
            pageSize: 20,
            theme: { color: '#4f46e5' },
            data: []
        });
    }

    function loadUserList() {
        fetch(USER_LIST_URL)
            .then(function(r) { return r.json(); })
            .then(function(r) {
                if (r.code === 0) {
                    selectUser.update({
                        data: r.data,
                        autoRow: true,
                    });
                } else {
                    showError('用户列表获取出错');
                }
            })
            .catch(function() {
                showError('用户列表获取异常');
            });
    }

    initXmSelect();
    loadUserList();
    loadTable(1);
})();
</script>
{% endblock %}

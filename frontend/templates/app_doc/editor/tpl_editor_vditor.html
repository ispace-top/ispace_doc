    // ---- Callout 实时渲染 (编辑器端) ----
    var _calloutDebounceTimer = null;
    var CALLOUT_MAP_EDITOR = {
        'i': 'info', 'info': 'info',
        'w': 'warning', 'warning': 'warning',
        'e': 'danger', 'error': 'danger',
        's': 'success', 'success': 'success',
        't': 'tip', 'tip': 'tip'
    };
    function processCalloutsInEditor() {
        var container = document.getElementById('editor-md');
        if (!container) return;
        // 使用 Selection API 检查光标是否在 blockquote 内，避免 DOM 修改导致光标丢失或跳动
        var sel = window.getSelection();
        var blockquotes = container.querySelectorAll('blockquote');
        for (var i = 0; i < blockquotes.length; i++) {
            var bq = blockquotes[i];
            // 跳过光标所在的 blockquote
            if (sel && sel.rangeCount > 0) {
                var range = sel.getRangeAt(0);
                if (bq.contains(range.startContainer) || bq === range.startContainer) continue;
            }
            var firstP = bq.firstElementChild;
            if (!firstP || firstP.tagName !== 'P') continue;
            var existingIcon = firstP.querySelector('.callout-icon');
            var existingPrefix = firstP.querySelector('.callout-prefix');
            var text = firstP.textContent || '';
            var match = text.match(/^([iwets]|info|warning|error|success|tip)\s+/i);
            bq.classList.remove('info', 'warning', 'danger', 'success', 'tip');
            if (match) {
                var rawPrefix = match[0];
                var cls = CALLOUT_MAP_EDITOR[rawPrefix.trim().toLowerCase()];
                if (cls) {
                    if (existingPrefix && existingPrefix.textContent === rawPrefix) {
                        bq.classList.add(cls);
                        continue;
                    }
                    if (existingIcon) existingIcon.parentNode.removeChild(existingIcon);
                    if (existingPrefix) existingPrefix.parentNode.removeChild(existingPrefix);
                    // 插入隐藏前缀 span 到开头
                    var prefixSpan = document.createElement('span');
                    prefixSpan.className = 'callout-prefix';
                    prefixSpan.textContent = rawPrefix;
                    firstP.insertBefore(prefixSpan, firstP.firstChild);
                    // 图标通过 CSS blockquote.xxx > p:first-child::before 渲染,不注入 DOM 元素
                    // 从第一个文本节点中移除前缀文字，保留其余 HTML 格式（加粗等）
                    var stripped = false;
                    for (var _k = 0; _k < firstP.childNodes.length; _k++) {
                        var node = firstP.childNodes[_k];
                        if (node.nodeType === 3) {
                            var t = node.textContent;
                            if (!stripped && t.substring(0, rawPrefix.length) === rawPrefix) {
                                node.textContent = t.substring(rawPrefix.length);
                                stripped = true;
                            }
                            if (!stripped && t === rawPrefix) {
                                node.textContent = '';
                                stripped = true;
                            }
                            if (stripped) break;
                        }
                    }
                    bq.classList.add(cls);
                }
            } else if (existingIcon || existingPrefix) {
                if (existingIcon) existingIcon.parentNode.removeChild(existingIcon);
                if (existingPrefix) {
                    var pfText = existingPrefix.textContent || '';
                    existingPrefix.parentNode.replaceChild(document.createTextNode(pfText), existingPrefix);
                }
            }
        }
    }
    function scheduleCalloutProcess() {
        clearTimeout(_calloutDebounceTimer);
        _calloutDebounceTimer = setTimeout(processCalloutsInEditor, 300);
    }

    var editor = new Vditor('editor-md',{

        "cdn":"{% static 'vditor' %}",

        "placeholder":"道友，开始吧……",

        "counter":{

        },
        "cache": {

        },
        "preview": {
            "markdown": {
                "autoSpace": true,// 自动空格
                "chinesePunct": true,// 矫正标点
                "mark": true,//Mark标记
            },
            "hljs":{
                "lineNumber":true,//代码行号
            }
        },
        "after":function(){
            layer.closeAll('loading');
            if (vditor_mode === 'ir') { processCalloutsInEditor(); }
        },
        "input":function(){
            md_changed = true;
            autoCacheDoc();
            if (vditor_mode === 'ir') { scheduleCalloutProcess(); }
        },
        "upload":{
            fieldName:"editormd-image-file[]",
            url:"{% url 'upload_doc_img' %}",
            linkToImgUrl:"{% url 'upload_doc_img' %}",
            linkToImgCallback:function(e){

            },
            linkToImgFormat:function(e){

                return e
            },
            handler(files){//自定义粘贴上传图片

                var reader = new FileReader();
                reader.onload = function (event) {
                    var base64 = event.target.result;
                    //ajax上传图片
                    layer.load(1);

                        layer.msg(ret.message);
                        if (ret.success === 1) {

                            layer.closeAll("loading");
                            editor.insertValue("\n![](" + ret.url + ")");
                            editor.focus()
                        }else{
                            layer.closeAll("loading");
                            layer.msg("粘贴图片失败！")
                        }
                    });
                }; // data url!
                var url = reader.readAsDataURL(files[0]);
            }
        }
    });

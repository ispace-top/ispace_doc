name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ispace
          POSTGRES_USER: ispace
          POSTGRES_PASSWORD: ispace123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ispace -d ispace"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test config
        run: |
          cp config/conf/config.ini config/conf/config-ci.ini
          echo -e "\n[cache]\nbackend = redis\nlocation = redis://localhost:6379/0" >> config/conf/config-ci.ini

      - name: Run migrations
        env:
          ISDOC_CONFIG: config-ci.ini
        run: python manage.py migrate --noinput

      - name: Run tests
        env:
          ISDOC_CONFIG: config-ci.ini
          DJANGO_SETTINGS_MODULE: backend.core.settings
        run: |
          python manage.py test backend.apps.doc --verbosity=2
          python manage.py test backend.apps.doc.tests_api --verbosity=2

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint with flake8
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --exit-zero --max-complexity=15 --statistics

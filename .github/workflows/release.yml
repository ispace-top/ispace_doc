name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 0.9.0），留空则使用 git tag'
        required: false
        default: ''

env:
  DOCKERHUB_REPO: wapedkj/ispace-doc

jobs:
  build-push:
    name: Build & Push Multi-Arch Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================================
      # 确定版本号：Release → 从 tag 提取；手动 → 使用输入值
      # ============================================================
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      # ============================================================
      # 多架构构建环境（QEMU 模拟 ARM + Buildx 构建器）
      # ============================================================
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============================================================
      # 登录 Docker Hub
      # ============================================================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ============================================================
      # 生成镜像标签
      #
      # 标签策略：
      #   latest              — 正式发布时指向最新稳定版
      #   x.y.z               — 固定版本号（如 0.9.0）
      #   x.y                 — 次版本号（如 0.9）
      #   x                   — 主版本号（如 0）
      # ============================================================
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # ============================================================
      # 构建并推送多架构镜像（amd64 + arm64）
      # ============================================================
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: config/docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ============================================================
      # 发布摘要
      # ============================================================
      - name: Release summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "### 🐳 Docker 镜像已发布" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | 架构 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.DOCKERHUB_REPO }}:$VERSION\` | linux/amd64 + linux/arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.DOCKERHUB_REPO }}:latest\` | linux/amd64 + linux/arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**拉取命令**：" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# x86_64 / AMD64 服务器" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKERHUB_REPO }}:$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# ARM64 服务器（树莓派 / Apple Silicon / 华为鲲鹏等）" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKERHUB_REPO }}:$VERSION" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

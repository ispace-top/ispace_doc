[site]
debug = False

[database]
engine = sqlite

[locale]

[selenium]

[search]
backend = whoosh

[storage]
backend = local

[cache]
backend = locmem
location = unique-snowflake

[celery]
broker_url = redis://localhost:6379/1
result_backend = redis://localhost:6379/2

# OIDC 认证（Keycloak / Auth0 / Azure AD / Okta）

[site]
debug = True

[database]
engine = postgresql
name = ispace
user = ispace
# 密码通过环境变量 DB_PASSWORD 注入（docker-compose.yml 中配置）
# 本地直接运行时修改此值为实际密码
password =
host = db
port = 5432

[locale]
language = zh-hans
timezone = Asia/Shanghai

[selenium]
# Docker 环境使用 Chromium headless
# driver = Chrome

# ============================================================
# 任务队列 (Celery + Redis)
# ============================================================
[cache]
backend = redis
location = redis://redis:6379/0

[celery]
broker_url = redis://redis:6379/1
result_backend = redis://redis:6379/2

# ============================================================
# 搜索引擎
# ============================================================
[search]
backend = elasticsearch

[search.elasticsearch]
hosts = http://elasticsearch:9200
index = ispace_docs

# ============================================================
# 文件存储
# ============================================================
[storage]
backend = local

# ============================================================
# 邮件
# ============================================================
[email]
smtp_host =
smtp_port = 587
smtp_user =
smtp_password =
smtp_from = noreply@ispace.com

# ============================================================
# 第三方认证（按需取消注释）
# ============================================================

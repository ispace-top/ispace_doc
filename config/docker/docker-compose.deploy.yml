version: '3.8'

services:
  # ============================================================
  # PostgreSQL 16
  # ============================================================
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-ispace}
      POSTGRES_USER: ${DB_USER:-ispace}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请设置 DB_PASSWORD 环境变量}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ispace} -d ${DB_NAME:-ispace}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================================
  # Redis 7
  # ============================================================
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # Elasticsearch 8.x (单节点)
  # ============================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 10s
      timeout: 5s
      retries: 30

  # ============================================================
  # Django 主应用 (uWSGI)
  # ============================================================
  app:
    image: ${DOCKER_IMAGE:-wapedkj/ispace-doc}:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ISDOC_CONFIG=config-docker.ini
      - DB_NAME=${DB_NAME:-ispace}
      - DB_USER=${DB_USER:-ispace}
      - DB_PASSWORD=${DB_PASSWORD:?请设置 DB_PASSWORD 环境变量}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-ispace}:${DB_PASSWORD}@db:5432/${DB_NAME:-ispace}
      - REDIS_URL=redis://redis:6379/0
      - ES_HOSTS=http://elasticsearch:9200
      - SECRET_KEY=${SECRET_KEY:?请设置 SECRET_KEY 环境变量}
      - DEBUG=${DEBUG:-false}
    volumes:
      - media:/app/iSpaceDoc/media
      - log:/app/iSpaceDoc/log
    ports:
      - "${APP_PORT:-8000}:8000"

  # ============================================================
  # FastAPI 独立服务 (Uvicorn)
  # ============================================================
  fastapi:
    image: ${DOCKER_IMAGE:-wapedkj/ispace-doc}:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-ispace}:${DB_PASSWORD}@db:5432/${DB_NAME:-ispace}
      - REDIS_URL=redis://redis:6379/0
      - ES_HOSTS=http://elasticsearch:9200
      - SECRET_KEY=${SECRET_KEY:?请设置 SECRET_KEY 环境变量}
      - DEBUG=${DEBUG:-false}
    volumes:
      - media:/app/iSpaceDoc/media
    ports:
      - "${API_PORT:-8001}:8000"
    command: >
      sh -c "python manage.py migrate &&
             uvicorn backend.fastapi_app.main:app --host 0.0.0.0 --port 8000"

  # ============================================================
  # Celery Worker
  # ============================================================
  celery-worker:
    image: ${DOCKER_IMAGE:-wapedkj/ispace-doc}:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ISDOC_CONFIG=config-docker.ini
      - DB_NAME=${DB_NAME:-ispace}
      - DB_USER=${DB_USER:-ispace}
      - DB_PASSWORD=${DB_PASSWORD:?请设置 DB_PASSWORD 环境变量}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-ispace}:${DB_PASSWORD}@db:5432/${DB_NAME:-ispace}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?请设置 SECRET_KEY 环境变量}
    volumes:
      - media:/app/iSpaceDoc/media
    command: celery -A backend.core.celery worker -l info -c 4

  # ============================================================
  # Celery Beat (定时任务调度)
  # ============================================================
  celery-beat:
    image: ${DOCKER_IMAGE:-wapedkj/ispace-doc}:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ISDOC_CONFIG=config-docker.ini
      - DB_NAME=${DB_NAME:-ispace}
      - DB_USER=${DB_USER:-ispace}
      - DB_PASSWORD=${DB_PASSWORD:?请设置 DB_PASSWORD 环境变量}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-ispace}:${DB_PASSWORD}@db:5432/${DB_NAME:-ispace}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?请设置 SECRET_KEY 环境变量}
    command: celery -A backend.core.celery beat -l info

volumes:
  pgdata:
  redisdata:
  esdata:
  media:
  log: